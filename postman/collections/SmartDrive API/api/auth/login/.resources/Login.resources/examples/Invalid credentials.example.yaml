$kind: http-example
request:
  url: "{{baseUrl}}/api/auth/login"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "email": "admin@smartdrive.vn",
        "password": "Admin@123"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  body:
    type: text
    content: ""
order: 3000
