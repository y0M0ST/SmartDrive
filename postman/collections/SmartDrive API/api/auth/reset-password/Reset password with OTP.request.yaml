  type: json
  content: |-
    {
      "email": "admin@smartdrive.vn",
      "otp": "665581",
      "new_password": "Admin@12345",
      "confirm_password": "Admin@12345"
    }
examples: ./.resources/Reset password with OTP.resources/examples
order: 1000
