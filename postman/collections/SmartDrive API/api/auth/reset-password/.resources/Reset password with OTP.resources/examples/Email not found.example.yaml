$kind: http-example
request:
  url: "{{baseUrl}}/api/auth/reset-password"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "email": "admin@smartdrive.vn",
        "otp": "662788",
        "new_password": "Admin@789",
        "confirm_password": "Admin@789"
      }
response:
  statusCode: 404
  statusText: Not Found
  body:
    type: text
    content: ""
order: 3000
