$kind: http-example
request:
  url: "{{baseUrl}}/api/auth/change-password"
  method: PUT
  headers:
    - key: Content-Type
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "old_password": "Admin@123",
        "new_password": "Admin@456",
        "confirm_password": "Admin@456"
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: text
    content: ""
order: 2000
