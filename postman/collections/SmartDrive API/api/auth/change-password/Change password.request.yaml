$kind: http-request
name: Change password
url: "{{baseUrl}}/api/auth/change-password"
method: PUT
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "old_password": "Admin@1234",
      "new_password": "Admin@456",
      "confirm_password": "Admin@456"
    }
auth:
  type: bearer
  credentials:
    token: "{{token}}"
examples: ./.resources/Change password.resources/examples
order: 1000
