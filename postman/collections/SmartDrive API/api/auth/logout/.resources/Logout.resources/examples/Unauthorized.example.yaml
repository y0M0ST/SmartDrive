$kind: http-example
request:
  url: "{{baseUrl}}/api/auth/logout"
  method: POST
  headers:
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
response:
  statusCode: 401
  statusText: Unauthorized
  body:
    type: text
    content: ""
order: 2000
